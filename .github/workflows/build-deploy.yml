name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Setup Unity
        uses: buildalon/unity-setup@v1
        with:
          unity-version: 6000.4.4f1
          modules: webgl

      - name: Activate Unity Personal License
        uses: buildalon/activate-unity-license@v2
        with:
          license: Personal
          username: ${{ secrets.UNITY_EMAIL }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build WebGL
        uses: buildalon/unity-action@v3
        with:
          build-target: WebGL
          log-name: Build-WebGL
          args: -quit -batchmode -nographics -executeMethod CIBuilder.BuildWebGL -buildPath ${{ github.workspace }}/build/WebGL

      - name: Show build output
        run: |
          ls -la "${{ github.workspace }}/build/WebGL"
          du -sh "${{ github.workspace }}/build/WebGL"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/build/WebGL

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
